<!-- Wrap markdown tables in a scrollable div so they fill width AND scroll on narrow screens -->
<script defer>
document.addEventListener('DOMContentLoaded', function () {
  var selectors = '.entry-content table, .page-content table';
  document.querySelectorAll(selectors).forEach(function (table) {
    var wrapper = document.createElement('div');
    wrapper.className = 'table-scroll';
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });
});
</script>
